name: Build and Release PTD Launcher

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            ext: exe

          - os: ubuntu-22.04
            label: Linux
            ext: AppImage

          - os: macos-latest
            label: macOS
            ext: dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Otomatik versiyon: commit sayısından üret (örn: 1.0.42)
      - name: Generate version
        id: version
        shell: bash
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COUNT}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Generated version: $VERSION"

      - name: Inject version into config files (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$OSTYPE" == "darwin"* ]]; then
            SED="sed -i ''"
          else
            SED="sed -i"
          fi
          $SED "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json
          $SED "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          perl -i -0pe "s/^(version = \")[^\"]*(\")/\${1}${VERSION}\${2}/m" src-tauri/Cargo.toml

      - name: Inject version into config files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          (Get-Content package.json -Raw) -replace '"version": "[^"]*"', "`"version`": `"$v`"" |
            Set-Content package.json -NoNewline
          (Get-Content src-tauri/tauri.conf.json -Raw) -replace '"version": "[^"]*"', "`"version`": `"$v`"" |
            Set-Content src-tauri/tauri.conf.json -NoNewline
          $cargo = Get-Content src-tauri/Cargo.toml -Raw
          $cargo = $cargo -replace '(?m)^version = "[^"]*"', "version = `"$v`""
          [System.IO.File]::WriteAllText("src-tauri/Cargo.toml", $cargo)

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri app (Linux)
        if: runner.os == 'Linux'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri app (macOS universal)
        if: runner.os == 'macOS'
        shell: bash
        run: bun run tauri build --target universal-apple-darwin

      - name: Find and rename artifact (Windows)
        if: runner.os == 'Windows'
        id: artifact_windows
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          $file = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if (-not $file) { Write-Error "No .exe found"; exit 1 }
          $out = Join-Path $file.DirectoryName "PTDLauncher-Windows-v$v.exe"
          Rename-Item $file.FullName "PTDLauncher-Windows-v$v.exe"
          echo "path=$out" >> $env:GITHUB_OUTPUT

      - name: Find and rename artifact (Linux)
        if: runner.os == 'Linux'
        id: artifact_linux
        shell: bash
        run: |
          v="${{ steps.version.outputs.version }}"
          file=$(ls src-tauri/target/release/bundle/appimage/*.AppImage 2>/dev/null | head -n1)
          [ -z "$file" ] && echo "No AppImage found" && exit 1
          out="$(dirname $file)/PTDLauncher-Linux-v$v.AppImage"
          mv "$file" "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Find and rename artifact (macOS)
        if: runner.os == 'macOS'
        id: artifact_macos
        shell: bash
        run: |
          v="${{ steps.version.outputs.version }}"
          file=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null | head -n1)
          [ -z "$file" ] && echo "No .dmg found" && exit 1
          out="$(dirname $file)/PTDLauncher-macOS-v$v.dmg"
          mv "$file" "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: PTDLauncher-Windows
          path: ${{ steps.artifact_windows.outputs.path }}

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: PTDLauncher-Linux
          path: ${{ steps.artifact_linux.outputs.path }}

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: PTDLauncher-macOS
          path: ${{ steps.artifact_macos.outputs.path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        shell: bash
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COUNT}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ steps.version.outputs.version }}
          name: PTD Launcher v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/PTDLauncher-Windows/*
            artifacts/PTDLauncher-Linux/*
            artifacts/PTDLauncher-macOS/*
